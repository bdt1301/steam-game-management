<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title th:text="${session.role == 'ADMIN' ? 'Steam Game Management' : 'Steam Game Data'}"></title>

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" />

        <link rel="stylesheet" href="/css/styles.css" />
    </head>
    <body>
        <div th:replace="~{fragments/header :: header}"></div>
        <script src="/js/navigation.js"></script>

        <main class="container">
            <h1 class="page-title">Notifications</h1>

            <form th:action="@{/notifications/new}" method="post">
                <div class="form-group">
                    <label for="title">Title</label>
                    <input
                        type="text"
                        id="title"
                        name="title"
                        class="form-control"
                        placeholder="Nhập tiêu đề"
                        required
                    />
                </div>

                <div class="form-group">
                    <label for="message">Message</label>
                    <input
                        type="text"
                        id="message"
                        name="message"
                        class="form-control"
                        placeholder="Nhập nội dung"
                        required
                    />
                </div>

                <div class="form-group">
                    <label for="redirectLink">Redirect Link</label>
                    <input
                        type="text"
                        id="redirectLink"
                        name="redirectLink"
                        class="form-control"
                        placeholder="/games/123"
                    />
                </div>

                <div class="form-group">
                    <label for="userIds">Users</label>
                    <select id="userIds" name="userIds" class="form-control select2" multiple>
                        <option value="" disabled>Select users</option>
                        <option value="0">All User</option>
                        <option th:each="user : ${users}" th:value="${user.userId}" th:text="${user.username}"></option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="gameIds">Games</label>
                    <select id="gameIds" name="gameIds" class="form-control select2" multiple>
                        <option value="" disabled>Select games</option>
                        <option th:each="game : ${games}" th:value="${game.appId}" th:text="${game.title}"></option>
                    </select>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Send</button>
            </form>
        </main>

        <div th:replace="~{fragments/alert :: alert-bar}"></div>
        <script src="/js/alert.js"></script>

        <div th:replace="~{fragments/footer :: footer}"></div>

        <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
        <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

        <script>
            $(document).ready(function () {
                $('.select2').select2({
                    allowClear: true,
                    placeholder: 'Select options',
                });
            });
        </script>
    </body>
</html>
