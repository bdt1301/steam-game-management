<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title th:text="${session.role == 'ADMIN' ? 'Steam Game Management' : 'Steam Game Data'}"></title>

        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />
        <link rel="stylesheet" href="/css/styles.css" />
    </head>
    <body>
        <div th:replace="~{fragments/header :: header}"></div>
        <script src="/js/navigation.js"></script>

        <main class="container">
            <h1 class="page-title">Notifications</h1>

            <div class="text-right">
                <form th:action="@{/notifications/markAllRead}" method="post" style="display: inline">
                    <button type="submit" class="btn btn-link mark-all-read">Mark All as Read</button>
                </form>
            </div>

            <ul class="all-notifications-list">
                <li
                    th:each="un : ${notifications}"
                    th:classappend="${un.read ? 'notification-read' : 'notification-unread'}"
                >
                    <form th:action="@{/notifications/markAsRead/{id}(id=${un.notification.id})}" method="post">
                        <button type="submit" class="btn">
                            <div class="notification-content">
                                <strong th:text="${un.notification.title}" class="notification-title"></strong>
                                <p th:text="${un.notification.message}" class="notification-message"></p>
                            </div>
                            <span
                                th:text="${#dates.format(un.notification.createdAt,'dd/MM/yyyy HH:mm')}"
                                class="notification-date"
                            >
                            </span>
                        </button>
                    </form>
                </li>
            </ul>
        </main>

        <div th:replace="~{fragments/alert :: alert-bar}"></div>
        <script src="/js/alert.js"></script>

        <div th:replace="~{fragments/footer :: footer}"></div>

        <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
        <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
    </body>
</html>
